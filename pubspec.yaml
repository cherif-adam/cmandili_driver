name: cmandili_driver
description: A premium food delivery driver application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Firebase push notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.0.0

  # Authentication
  google_sign_in: ^6.1.6
  supabase_flutter: ^2.3.0

  # Maps & Location
  mapbox_maps_flutter: ^2.3.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  flutter_background_service: ^5.0.5

  # Images (only image_picker is actually used in lib/)
  image_picker: ^1.0.7

  # Utilities
  intl: any
  shared_preferences: ^2.2.2

  # Runtime permissions
  permission_handler: ^11.1.0

  # Icons & config
  cupertino_icons: ^1.0.6
  flutter_dotenv: ^6.0.0

  # Phone call (tap-to-call customer)
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_driver.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/icons/